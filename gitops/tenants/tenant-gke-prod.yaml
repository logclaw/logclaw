# ─────────────────────────────────────────────────────────────────────────────
# LogClaw — GKE Production Deployment
# Full-stack enterprise config on Google Kubernetes Engine.
#
# Capacity: ~10K users / ~100K logs·min⁻¹ peak
# Cluster:  GKE Autopilot-ready, cluster autoscaler 3→8 e2-standard-4 nodes
#           (12–32 vCPU, 48–128 GB RAM, scales automatically)
#
# Scaling levers (in priority order):
#   1. Kafka partitions (raw-logs 6, enriched 6)  → horizontal Flink parallelism
#   2. OpenSearch data node replicas (1→3)         → search throughput
#   3. Flink TM replicas + parallelism             → processing throughput
#   4. Ingestion replicas (HPA 1→8)                → ingest throughput
#   5. Kafka brokers (1→3) + replication.factor 3  → durability + throughput
#
# Deploy:    GCP_PROJECT_ID=project-565165fe-d4ff-48fd-a54 ./scripts/setup-gke.sh
# Tear down: GCP_PROJECT_ID=project-565165fe-d4ff-48fd-a54 ./scripts/setup-gke.sh --teardown
# ─────────────────────────────────────────────────────────────────────────────

tenantId: "gke-prod"
clusterServer: ""

# ═════════════════════════════════════════════════════════════════════════════
# INGRESS — Cloudflare DNS → NGINX Ingress Controller (35.225.68.81)
# ═════════════════════════════════════════════════════════════════════════════
ingress:
  enabled: true
  dashboard:
    host: "app.logclaw.ai"
  api:
    host: "api.logclaw.ai"
  airflow:
    host: "airflow.logclaw.ai"
  flink:
    host: "flink.logclaw.ai"

global:
  tenantId: "gke-prod"
  tenantName: "LogClaw Production"
  imageRegistry: ""
  storageClass: "standard-hdd"
  storageClassHighThroughput: "standard-rwo"
  tier: "standard"

  # ── Inter-component connectivity ─────────────────────────────────────────
  kafkaBrokers: "logclaw-kafka-bootstrap.logclaw.svc.cluster.local:9092"
  opensearchEndpoint: "https://logclaw-logclaw-opensearch.logclaw.svc.cluster.local:9200"

  kafkaTopics:
    rawLogs: "raw-logs"
    enriched: "enriched-logs"
    anomalies: "anomaly-events"

  objectStorage:
    provider: "gcs"
    bucket: "logclaw-prod-data"
    region: "us-central1"

  secretStore:
    provider: "gcp"
    projectId: "project-565165fe-d4ff-48fd-a54"
    region: "us-central1"
    gcp:
      projectId: "project-565165fe-d4ff-48fd-a54"
      clusterName: "logclaw-prod"
      clusterLocation: "us-central1-a"
      serviceAccount: "logclaw-sa@project-565165fe-d4ff-48fd-a54.iam.gserviceaccount.com"

  # ── LLM — disabled for demo (enable claude/openai/ollama per customer) ──
  llm:
    provider: "disabled"
    model: "llama3.2:8b"

  # ── Networking ────────────────────────────────────────────────────────────
  clusterDomain: "cluster.local"
  ingressClass: "nginx"

  # ── TLS via cert-manager ──────────────────────────────────────────────────
  tls:
    enabled: true
    issuerName: "logclaw-issuer"
    issuerKind: "ClusterIssuer"
    clusterIssuer: "logclaw-issuer"

  # ── Pod Security Standards ────────────────────────────────────────────────
  podSecurityStandards:
    enforce: "privileged"
    audit: "restricted"
    warn: "restricted"
  podSecurity:
    enforceLevel: "privileged"
    auditLevel: "restricted"
    warnLevel: "restricted"
    enforceVersion: "latest"
    auditVersion: "latest"
    warnVersion: "latest"

  # ── ArgoCD ────────────────────────────────────────────────────────────────
  argocd:
    namespace: "argocd"

  # ── Observability ─────────────────────────────────────────────────────────
  monitoring:
    enabled: false
    namespace: "monitoring"
    prometheusNamespace: "monitoring"
    grafanaDashboards: false

  resourcePreset: "small"

# ═════════════════════════════════════════════════════════════════════════════
# COMPONENT TOGGLES — full enterprise stack
# ═════════════════════════════════════════════════════════════════════════════
platform:
  enabled: true
ingestion:
  enabled: true
kafka:
  enabled: true
opensearch:
  enabled: true
flink:
  enabled: true
mlEngine:
  enabled: true
airflow:
  enabled: true
bridge:
  enabled: true
ticketingAgent:
  enabled: true
dashboard:
  enabled: true
zammad:
  enabled: false

# ═════════════════════════════════════════════════════════════════════════════
# COMPONENT SIZING — production-grade for ~10K users
#
# Resource budget (3 nodes baseline, autoscales to 8):
#   Kafka       ~2 vCPU / 4 Gi    (broker + ZK)
#   OpenSearch  ~3 vCPU / 8 Gi    (master + data)
#   Flink       ~4 vCPU / 8 Gi    (3 JMs + 3 TMs)
#   Ingestion   ~0.5 vCPU / 512 Mi (scales via HPA)
#   Airflow     ~2 vCPU / 4 Gi    (webserver + scheduler + PG)
#   ML Engine   ~0.5 vCPU / 1 Gi  (Feast + Redis)
#   Bridge      ~0.5 vCPU / 512 Mi
#   Ticketing   ~0.5 vCPU / 512 Mi (scales via HPA)
#   Dashboard   ~0.5 vCPU / 512 Mi (scales via HPA)
#   ────────────────────────────────
#   Total base  ~13.5 vCPU / 27 Gi → fits 3x e2-standard-4
#   Peak (HPA)  ~25 vCPU / 50 Gi  → autoscales to 7 nodes
# ═════════════════════════════════════════════════════════════════════════════

# ── Kafka — message backbone ──────────────────────────────────────────────
# 1 broker for now; scale to 3 brokers + RF=3 when >5K users
logclaw-kafka:
  kafka:
    replicas: 1
    version: "4.0.0"
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: "50Gi"                                      # 50Gi — 24h retention at ~100K logs/min
          deleteClaim: false
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: "1"                       # bump to 3 when scaling to 3 brokers
      min.insync.replicas: "1"
      log.retention.hours: "48"                             # 2 days retention (was 24h)
      log.segment.bytes: "1073741824"
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      num.io.threads: "8"
      num.network.threads: "3"
    resources:
      requests:
        cpu: "500m"
        memory: "1536Mi"
      limits:
        cpu: "2"
        memory: "4Gi"
    jvmOptions:
      -Xms: "1g"
      -Xmx: "2g"
  topics:
    rawLogs:
      partitions: 6                                         # 6 partitions — supports 6x Flink parallelism
      replicas: 1
      retentionMs: "172800000"                              # 2 days
      segmentBytes: "1073741824"
    enriched:
      partitions: 6
      replicas: 1
      retentionMs: "172800000"
    anomalies:
      partitions: 3
      replicas: 1
      retentionMs: "604800000"                              # 7 days
    dlq:
      partitions: 1
      replicas: 1
      retentionMs: "2592000000"                             # 30 days
  kafkaConnect:
    enabled: false
  s3Sink:
    enabled: false
  mirrorMaker2:
    enabled: false

# ── OpenSearch — log storage + search ─────────────────────────────────────
# 1 master + 1 data for now; scale data to 3 replicas when >5K users
logclaw-opensearch:
  opensearch:
    version: "2.14.0"
    masters:
      replicas: 1
      diskSize: "20Gi"
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "3Gi"
      jvm:
        xms: "1536m"
        xmx: "1536m"
    data:
      replicas: 1
      diskSize: "100Gi"                                     # 100Gi — ~30 days of indexed logs at 10K users
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      jvm:
        xms: "2g"
        xmx: "2g"
    coordinators:
      replicas: 0
    security:
      tls:
        enabled: false
  adminCredentialsSecret:
    createExternalSecret: false
  podDisruptionBudget:
    dataNodes:
      minAvailable: 0
    masterNodes:
      minAvailable: 0

# ── Ingestion — Vector log receiver (HPA-enabled) ────────────────────────
logclaw-ingestion:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  sources:
    http:
      tls:
        enabled: false
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ── Bridge — trace correlation engine ──────────────────────────────────────
logclaw-bridge:
  image:
    repository: "us-central1-docker.pkg.dev/project-565165fe-d4ff-48fd-a54/logclaw/bridge"
    tag: "1.1.0"
  bridge:
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "512Mi"

# ── Ticketing Agent — AI incident ticketing (HPA-enabled) ─────────────────
logclaw-ticketing-agent:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
  image:
    repository: "us-central1-docker.pkg.dev/project-565165fe-d4ff-48fd-a54/logclaw/ticketing-agent"
    tag: "1.0.4"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  config:
    anomaly:
      minimumScore: 0.85

# ── Flink — stream processing ETL ─────────────────────────────────────────
# 3 jobs: ETL → Enrichment → Anomaly Scorer
# Parallelism matches Kafka partition count for optimal throughput
logclaw-flink:
  flink:
    version: "1.19"
    jobImageTag: "0.1.1"
    image:
      repository: "us-central1-docker.pkg.dev/project-565165fe-d4ff-48fd-a54/logclaw/logclaw-flink-jobs"
      tag: "0.1.1"
    jobManager:
      cpu: 0.5
      memory: "1024m"
      replicas: 1
    taskManager:
      cpu: 1
      memory: "2048m"
      replicas: 1
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "1"                                          # increase to 2 when cluster scales to 5+ nodes
          memory: "2Gi"
    etlJob:
      enabled: true
      parallelism: 3                                        # matches raw-logs partitions / task slots
    enrichmentJob:
      enabled: true
      parallelism: 3
      taskManagerCpu: 0.5
      taskManagerMemory: "1024m"
      resourceRequests:
        cpu: "250m"
        memory: "512Mi"
      resourceLimits:
        cpu: "500m"
        memory: "1Gi"
    anomalyJob:
      enabled: true
      parallelism: 3                                        # matches anomalies partitions
    sessionCluster:
      enabled: false
    config:
      taskmanager.numberOfTaskSlots: "4"
      state.backend: "rocksdb"
      execution.checkpointing.interval: "30s"
      execution.checkpointing.mode: "EXACTLY_ONCE"
  podDisruptionBudget:
    minAvailable: 0

# ── ML Engine — Feast feature store + KServe inference ────────────────────
logclaw-ml-engine:
  externalSecret:
    secretStoreName: "logclaw-vault"
    secretStoreKind: "ClusterSecretStore"
  mlEngine:
    redis:
      bundled: true
    feast:
      image:
        repository: "feastdev/feature-server"
        tag: "0.40.0"
        pullPolicy: IfNotPresent
      replicaCount: 1
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    kserve:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      scaleTarget: 5
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "2Gi"
    ollama:
      enabled: false
  redis:
    global:
      imageRegistry: ""
      storageClass: "standard-hdd"
    image:
      registry: "docker.io"
      repository: "bitnami/redis"
      tag: "latest"
    auth:
      enabled: true
      existingSecret: "logclaw-ml-engine-redis-credentials"
      existingSecretPasswordKey: "redis-password"
    master:
      persistence:
        enabled: true
        storageClass: "standard-hdd"
        size: "5Gi"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    replica:
      replicaCount: 0
  podDisruptionBudget:
    minAvailable: 0

# ── Airflow — ML training pipeline orchestration ──────────────────────────
logclaw-airflow:
  airflow:
    executor: KubernetesExecutor
    fernetKeySecretName: "logclaw-airflow-credentials"
    webserverSecretKeySecretName: "logclaw-airflow-credentials"
    images:
      airflow:
        repository: "apache/airflow"
        tag: "2.9.3"
        pullPolicy: IfNotPresent
    config:
      core:
        load_examples: "False"
        parallelism: "16"
        max_active_tasks_per_dag: "8"
      scheduler:
        dag_dir_list_interval: "30"
      webserver:
        expose_config: "False"
        workers: "2"                                        # 2 Gunicorn workers — fits in 2Gi limit
    dags:
      gitSync:
        enabled: false
    postgresql:
      enabled: true
      global:
        imageRegistry: ""
        storageClass: "standard-hdd"
      image:
        registry: "docker.io"
        repository: "bitnami/postgresql"
        tag: "latest"
      primary:
        persistence:
          storageClass: "standard-hdd"
      auth:
        existingSecret: "logclaw-airflow-credentials"
        secretKeys:
          adminPasswordKey: "postgresql-password"
    redis:
      enabled: false
    webserver:
      replicas: 1
      defaultUser:
        enabled: false
      startupProbe:
        failureThreshold: 18                              # 180s cold-start budget
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
        periodSeconds: 15
      readinessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
        periodSeconds: 10
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
    scheduler:
      replicas: 1
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1536Mi"
    workers:
      replicas: 0
    triggerer:
      replicas: 0
    flower:
      enabled: false
    statsd:
      enabled: false
    serviceAccount:
      create: true
      name: ""
  podDisruptionBudget:
    scheduler:
      minAvailable: 0
    webserver:
      minAvailable: 0

# ── Dashboard — Next.js pipeline UI (HPA-enabled) ────────────────────────
logclaw-dashboard:
  replicaCount: 1
  image:
    repository: "us-central1-docker.pkg.dev/project-565165fe-d4ff-48fd-a54/logclaw/dashboard"
    tag: "1.2.1"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
