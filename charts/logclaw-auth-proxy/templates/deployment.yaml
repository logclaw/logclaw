apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logclaw-auth-proxy.fullname" . }}
  labels:
    {{- include "logclaw-auth-proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "logclaw-auth-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "logclaw-auth-proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "logclaw-auth-proxy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: auth-proxy
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4318
              protocol: TCP
            - name: grpc
              containerPort: 4317
              protocol: TCP
          env:
            - name: PORT
              value: "4318"
            - name: GRPC_PORT
              value: "4317"
            {{- if .Values.database.secretRef }}
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretRef.name }}
                  key: {{ .Values.database.secretRef.key }}
            {{- else if .Values.database.connectionString }}
            - name: DB_URL
              value: {{ .Values.database.connectionString | quote }}
            {{- end }}
            # ── Backend Services ───────────────────────────────────────────
            - name: TICKETING_AGENT_ENDPOINT
              value: "http://{{ .Release.Name }}-logclaw-ticketing-agent.{{ .Release.Namespace }}.svc.{{ .Values.global.clusterDomain | default "cluster.local" }}:8080"
            # ── OTEL Logging ────────────────────────────────────────────────
            - name: OTEL_SERVICE_NAME
              value: "logclaw-auth-proxy"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "tenant_id={{ include "logclaw-auth-proxy.logclawTenantId" . }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | default (printf "http://%s-logclaw-otel-collector.%s.svc.%s:4318" .Release.Name .Release.Namespace (.Values.global.clusterDomain | default "cluster.local")) | quote }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
