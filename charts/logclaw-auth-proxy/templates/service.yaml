apiVersion: v1
kind: Service
metadata:
  name: {{ include "logclaw-auth-proxy.fullname" . }}
  labels:
    {{- include "logclaw-auth-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.http.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.ports.grpc.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "logclaw-auth-proxy.selectorLabels" . | nindent 4 }}
