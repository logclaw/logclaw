{{- if and .Values.ingress .Values.ingress.enabled }}
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: OTLP endpoint (Auth Proxy — HTTP :4318)
     Forwards to: logclaw-auth-proxy for API key validation + tenant_id injection
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.otel }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-otel
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.otel.host }}
      secretName: {{ .Release.Name }}-otel-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.otel.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: OTLP gRPC endpoint (Auth Proxy — gRPC :4317)
     Requires a separate gRPC host to avoid conflict with HTTP ingress.
     Only enabled if ingress.otel.grpcHost is set.
     ════════════════════════════════════════════════════════════════════ */}}
{{- if and .Values.ingress.otel .Values.ingress.otel.grpcHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-otel-grpc
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.otel.grpcHost }}
      secretName: {{ .Release.Name }}-otel-grpc-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.otel.grpcHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4317
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: API endpoint (routes through Auth Proxy for tenant isolation)
     Forwards to: logclaw-auth-proxy which routes to Console API with tenant_id enforcement
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.api }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.api.host }}
      secretName: {{ .Release.Name }}-api-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: Ticketing Agent (Incident API — routed through Auth Proxy)
     Callers must provide x-logclaw-api-key header. Auth Proxy validates the
     key, enforces tenant isolation (strips caller's tenant_id, injects the
     validated one), rate-limits, and forwards to the Ticketing Agent.
     nginx rewrites /(.*)  →  /ticketing/$1 so the Auth Proxy can distinguish
     ticketing traffic from other /api/* routes.
     UAT: uat-ticket.logclaw.ai  |  Prod: ticket.logclaw.ai
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.ticketing }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ticketing
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/rewrite-target: /ticketing/$1
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.ticketing.host }}
      secretName: {{ .Release.Name }}-ticketing-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.ticketing.host }}
      http:
        paths:
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: Console (logclaw-enterprise — separate Helm release)
     Routes console.logclaw.ai → logclaw-console:3000
     Only created if ingress.console.host is set.
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.console }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-console
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.console.host }}
      secretName: {{ .Release.Name }}-console-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.console.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.console.serviceName | default "logclaw-console" }}
                port:
                  number: {{ .Values.ingress.console.servicePort | default 3000 }}
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: UI endpoints (dashboard, airflow, flink)
     ════════════════════════════════════════════════════════════════════ */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    {{- if .Values.ingress.dashboard }}
    - hosts:
        - {{ .Values.ingress.dashboard.host }}
      secretName: {{ .Release.Name }}-app-tls
    {{- end }}
    {{- if .Values.ingress.airflow }}
    - hosts:
        - {{ .Values.ingress.airflow.host }}
      secretName: {{ .Release.Name }}-airflow-tls
    {{- end }}
    {{- if .Values.ingress.flink }}
    - hosts:
        - {{ .Values.ingress.flink.host }}
      secretName: {{ .Release.Name }}-flink-tls
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.dashboard }}
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-dashboard
                port:
                  number: 3000
    {{- end }}
    {{- if .Values.ingress.airflow }}
    - host: {{ .Values.ingress.airflow.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webserver
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.flink }}
    - host: {{ .Values.ingress.flink.host }}
      http:
        paths:
          - path: /etl
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
          - path: /enrichment
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-enrichment-rest
                port:
                  number: 8081
          - path: /anomaly
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-anomaly-rest
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
    {{- end }}
{{- end }}
