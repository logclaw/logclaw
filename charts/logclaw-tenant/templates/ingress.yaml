{{- if and .Values.ingress .Values.ingress.enabled }}
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: OTLP endpoint (OTel Collector — gRPC :4317, HTTP :4318)
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.otel }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-otel
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.otel.host }}
      secretName: {{ .Release.Name }}-otel-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.otel.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-otel-collector
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: API endpoint (legacy — routes to OTel Collector)
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.api }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  rules:
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-otel-collector
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: UI endpoints (dashboard, airflow, flink)
     ════════════════════════════════════════════════════════════════════ */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    {{- if .Values.ingress.dashboard }}
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-dashboard
                port:
                  number: 3000
    {{- end }}
    {{- if .Values.ingress.airflow }}
    - host: {{ .Values.ingress.airflow.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webserver
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.flink }}
    - host: {{ .Values.ingress.flink.host }}
      http:
        paths:
          - path: /etl
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
          - path: /enrichment
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-enrichment-rest
                port:
                  number: 8081
          - path: /anomaly
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-anomaly-rest
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
    {{- end }}
{{- end }}
