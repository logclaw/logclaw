{{- if .Values.ingress }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    {{- /* ── Dashboard ───────────────────────────────────────── */}}
    {{- if .Values.ingress.dashboard }}
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-dashboard
                port:
                  number: 3000
    {{- end }}
    {{- /* ── Log Ingestion API ────────────────────────────────── */}}
    {{- if .Values.ingress.api }}
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-ingestion
                port:
                  number: 8080
    {{- end }}
    {{- /* ── Airflow UI ───────────────────────────────────────── */}}
    {{- if .Values.ingress.airflow }}
    - host: {{ .Values.ingress.airflow.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webserver
                port:
                  number: 8080
    {{- end }}
    {{- /* ── Flink Dashboard ──────────────────────────────────── */}}
    {{- if .Values.ingress.flink }}
    - host: {{ .Values.ingress.flink.host }}
      http:
        paths:
          - path: /etl
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
          - path: /enrichment
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-enrichment-rest
                port:
                  number: 8081
          - path: /anomaly
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-anomaly-rest
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
    {{- end }}
{{- end }}
{{- end }}
