{{- if and .Values.ingress .Values.ingress.enabled }}
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: API endpoint (log ingestion)
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.api }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-ingestion
                port:
                  number: 8080
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: UI endpoints (dashboard, airflow, flink)
     ════════════════════════════════════════════════════════════════════ */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    {{- if .Values.ingress.dashboard }}
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-dashboard
                port:
                  number: 3000
    {{- end }}
    {{- if .Values.ingress.airflow }}
    - host: {{ .Values.ingress.airflow.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webserver
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.flink }}
    - host: {{ .Values.ingress.flink.host }}
      http:
        paths:
          - path: /etl
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
          - path: /enrichment
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-enrichment-rest
                port:
                  number: 8081
          - path: /anomaly
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-anomaly-rest
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
    {{- end }}
{{- end }}
