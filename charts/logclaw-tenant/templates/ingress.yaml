{{- if and .Values.ingress .Values.ingress.enabled }}
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: OTLP endpoint (Auth Proxy — HTTP :4318)
     Forwards to: logclaw-auth-proxy for API key validation + tenant_id injection
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.otel }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-otel
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.otel.host }}
      secretName: {{ .Release.Name }}-otel-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.otel.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: OTLP gRPC endpoint (Auth Proxy — gRPC :4317)
     Requires a separate gRPC host to avoid conflict with HTTP ingress.
     Only enabled if ingress.otel.grpcHost is set.
     ════════════════════════════════════════════════════════════════════ */}}
{{- if and .Values.ingress.otel .Values.ingress.otel.grpcHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-otel-grpc
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.otel.grpcHost }}
      secretName: {{ .Release.Name }}-otel-grpc-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.otel.grpcHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4317
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: API endpoint (routes through Auth Proxy for tenant isolation)
     Forwards to: logclaw-auth-proxy which routes to Console API with tenant_id enforcement
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.api }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-api
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.api.host }}
      secretName: {{ .Release.Name }}-api-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-auth-proxy
                port:
                  number: 4318
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: Ticketing Agent (Incident API — HTTP :8080)
     Forwards to: logclaw-ticketing-agent for incident management
     UAT: uat-ticket.logclaw.ai  |  Prod: ticket.logclaw.ai
     ════════════════════════════════════════════════════════════════════ */}}
{{- if .Values.ingress.ticketing }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ticketing
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    {{- if .Values.global.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.global.tls.issuerName | default "logclaw-issuer" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingressClass | default "nginx" }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.ticketing.host }}
      secretName: {{ .Release.Name }}-ticketing-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.ticketing.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-ticketing-agent
                port:
                  number: 8080
{{- end }}
---
{{- /* ════════════════════════════════════════════════════════════════════
     Ingress: UI endpoints (dashboard, airflow, flink)
     ════════════════════════════════════════════════════════════════════ */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    {{- if .Values.ingress.dashboard }}
    - host: {{ .Values.ingress.dashboard.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-dashboard
                port:
                  number: 3000
    {{- end }}
    {{- if .Values.ingress.airflow }}
    - host: {{ .Values.ingress.airflow.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webserver
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.flink }}
    - host: {{ .Values.ingress.flink.host }}
      http:
        paths:
          - path: /etl
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
          - path: /enrichment
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-enrichment-rest
                port:
                  number: 8081
          - path: /anomaly
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-anomaly-rest
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-logclaw-flink-etl-rest
                port:
                  number: 8081
    {{- end }}
{{- end }}
