# CI test values — standard tier, minimal resources
global:
  tenantId: "ci-test"
  tenantName: "CI Test Tenant"
  storageClass: "standard"
  storageClassHighThroughput: "standard"
  tier: "standard"
  objectStorage:
    provider: "s3"
    bucket: "logclaw-ci-test"
    region: "us-east-1"
  secretStore:
    provider: "aws"
    region: "us-east-1"
    aws:
      iamRoleArn: "arn:aws:iam::000000000000:role/ci-lint-placeholder"
  monitoring:
    enabled: false
  llm:
    provider: "disabled"

bridge:
  enabled: false

dashboard:
  enabled: false

zammad:
  enabled: false
