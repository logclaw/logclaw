nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

airflow:
  executor: KubernetesExecutor
  # Secrets injected via ESO ExternalSecrets — never set here
  fernetKeySecretName: "logclaw-airflow-credentials"
  webserverSecretKeySecretName: "logclaw-airflow-credentials"

  config:
    core:
      load_examples: "False"
      parallelism: "32"
      max_active_tasks_per_dag: "16"
    scheduler:
      dag_dir_list_interval: "30"
    webserver:
      expose_config: "False"

  dags:
    gitSync:
      enabled: true
      repo: ""
      branch: "main"
      rev: "HEAD"
      depth: 1
      subPath: "dags/"
      sshKeySecret: "airflow-git-ssh"

  images:
    airflow:
      repository: "ghcr.io/logclaw/airflow"
      tag: "2.9.3"
      pullPolicy: IfNotPresent

  postgresql:
    enabled: true
    auth:
      existingSecret: "logclaw-airflow-credentials"
      secretKeys:
        adminPasswordKey: "postgresql-password"

  redis:
    enabled: false

  webserver:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"

  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"

  workers:
    replicas: 0

  serviceAccount:
    create: false
    name: ""

podDisruptionBudget:
  scheduler:
    minAvailable: 1
  webserver:
    minAvailable: 1
