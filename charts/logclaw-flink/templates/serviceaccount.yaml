{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "logclaw-flink.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-flink.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- /*
    IRSA annotation for AWS: allows the SA to assume an IAM role for S3 access
    (checkpoints, savepoints, HA storage).
    REQUIRED when global.objectStorage.provider is "s3".
    Set global.objectStorage.irsaRoleArn to enable.
    */}}
    {{- if eq ((.Values.global).objectStorage | default dict | dig "provider" "") "s3" }}
    {{- if not ((.Values.global).objectStorage).irsaRoleArn }}
    {{- fail "global.objectStorage.irsaRoleArn is required when objectStorage.provider is 's3'. Flink needs S3 access for checkpoints, savepoints, and HA storage." }}
    {{- end }}
    eks.amazonaws.com/role-arn: {{ .Values.global.objectStorage.irsaRoleArn | quote }}
    {{- end }}
    {{- /*
    Workload Identity annotation for GCP: allows the SA to impersonate a GCP SA
    for GCS access (checkpoints, savepoints, HA storage).
    REQUIRED when global.objectStorage.provider is "gcs".
    Set global.objectStorage.workloadIdentityGSA to enable.
    */}}
    {{- if eq ((.Values.global).objectStorage | default dict | dig "provider" "") "gcs" }}
    {{- if not ((.Values.global).objectStorage).workloadIdentityGSA }}
    {{- fail "global.objectStorage.workloadIdentityGSA is required when objectStorage.provider is 'gcs'. Flink needs GCS access for checkpoints, savepoints, and HA storage." }}
    {{- end }}
    iam.gke.io/gcp-service-account: {{ .Values.global.objectStorage.workloadIdentityGSA | quote }}
    {{- end }}
    {{- /*
    Azure Workload Identity for ADLS Gen2 / Blob Storage access.
    Set global.objectStorage.azureClientId to enable.
    */}}
    {{- if ((.Values.global).objectStorage).azureClientId }}
    azure.workload.identity/client-id: {{ .Values.global.objectStorage.azureClientId | quote }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}
