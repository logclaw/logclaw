apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logclaw-otel-collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-otel-collector.labels" . | nindent 4 }}
  annotations:
    logclaw.io/component: "otel-collector"
    logclaw.io/tenant-id: {{ include "logclaw-otel-collector.tenantId" . | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "logclaw-otel-collector.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "logclaw-otel-collector.selectorLabels" . | nindent 8 }}
        logclaw.io/tenant-id: {{ include "logclaw-otel-collector.tenantId" . | quote }}
      annotations:
        # Force pod restart on ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "logclaw-otel-collector.serviceAccountName" . }}
      automountServiceAccountToken: false

      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      terminationGracePeriodSeconds: 30

      volumes:
        - name: otel-config
          configMap:
            name: {{ include "logclaw-otel-collector.fullname" . }}-config

      containers:
        - name: otel-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}

          command:
            - "/otelcol-contrib"
            - "--config=/etc/otelcol/otel-collector-config.yaml"

          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP

          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol
              readOnly: true

          readinessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          startupProbe:
            httpGet:
              path: /
              port: 13133
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
