apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "logclaw-otel-collector.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-otel-collector.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    # =========================================================================
    # OpenTelemetry Collector Configuration — LogClaw Ingestion Gateway
    # Tenant: {{ include "logclaw-otel-collector.tenantId" . }}
    # Generated by Helm chart version {{ .Chart.Version }}
    # =========================================================================

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      # Prevent OOM — must be first in pipeline
      memory_limiter:
        check_interval: {{ .Values.config.processors.memoryLimiter.checkIntervalMs }}ms
        limit_mib: {{ .Values.config.processors.memoryLimiter.limitMib }}
        spike_limit_mib: {{ .Values.config.processors.memoryLimiter.spikeLimitMib }}

      # Inject tenant_id as a resource attribute
      resource:
        attributes:
          - key: tenant_id
            value: "{{ include "logclaw-otel-collector.tenantId" . }}"
            action: upsert

      # Batch for throughput
      batch:
        send_batch_size: {{ .Values.config.processors.batch.sendBatchSize }}
        timeout: {{ .Values.config.processors.batch.timeout }}

    exporters:
      kafka:
        brokers:
          - {{ include "logclaw-otel-collector.kafkaBrokers" . }}
        topic: {{ include "logclaw-otel-collector.kafkaTopicRaw" . }}
        encoding: {{ .Values.config.exporters.kafka.encoding }}
        producer:
          compression: {{ .Values.config.exporters.kafka.compression }}
          max_message_bytes: 10485760

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [kafka]
      telemetry:
        metrics:
          address: "0.0.0.0:8888"
