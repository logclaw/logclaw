{{- $rawLogsTopic := default "raw-logs" .Values.global.kafkaTopics.rawLogs }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: logclaw-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-kafka.labels" . | nindent 4 }}
    strimzi.io/cluster: {{ .Release.Name }}
    logclaw.io/component: otel-collector
spec:
  authentication:
    type: scram-sha-512

  authorization:
    type: simple
    acls:
      # Write OTLP-encoded log batches to the ingest topic
      - resource:
          type: topic
          name: {{ $rawLogsTopic | quote }}
          patternType: literal
        operations:
          - Write
          - Describe

      # Transactional writes — ensures exactly-once semantics
      - resource:
          type: transactionalId
          name: "logclaw-otel-collector-*"
          patternType: prefix
        operations:
          - Write
          - Describe

      # Required for idempotent producer
      - resource:
          type: cluster
          name: kafka-cluster
          patternType: literal
        operations:
          - IdempotentWrite
