apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logclaw-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "logclaw-dashboard.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "logclaw-dashboard.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with ((.Values.global).imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "logclaw-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_PUBLIC_TENANT_ID
              value: {{ include "logclaw-dashboard.tenantId" . | quote }}
            - name: OPENSEARCH_ENDPOINT
              value: {{ include "logclaw-dashboard.opensearchEndpoint" . | quote }}
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin-credentials
                  key: username
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin-credentials
                  key: password
                  optional: true
            - name: VECTOR_ENDPOINT
              value: {{ include "logclaw-dashboard.vectorEndpoint" . | quote }}
            - name: TICKETING_ENDPOINT
              value: {{ include "logclaw-dashboard.ticketingEndpoint" . | quote }}
            - name: BRIDGE_ENDPOINT
              value: {{ include "logclaw-dashboard.bridgeEndpoint" . | quote }}
            - name: FEAST_ENDPOINT
              value: {{ include "logclaw-dashboard.feastEndpoint" . | quote }}
            - name: AIRFLOW_ENDPOINT
              value: {{ include "logclaw-dashboard.airflowEndpoint" . | quote }}
          volumeMounts:
            - name: nextjs-cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nextjs-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
