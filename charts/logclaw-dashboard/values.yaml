nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: "ghcr.io/logclaw/logclaw-dashboard"
  tag: "2.0.0"    # OPUS release
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
