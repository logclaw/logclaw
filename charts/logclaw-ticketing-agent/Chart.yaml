apiVersion: v2
name: logclaw-ticketing-agent
description: >
  LogClaw RCA ticketing microservice: consumes anomaly events from Kafka,
  queries OpenSearch for context, generates PagerDuty alerts and
  Jira/ServiceNow RCA tickets with root cause, evidence, and timeline.
