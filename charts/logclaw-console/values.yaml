nameOverride: ""
fullnameOverride: ""
replicaCount: 2

image:
  repository: "ghcr.io/logclaw/logclaw-enterprise"
  tag: "sha-287f501"    # Email always-on + org member auto-population
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-logclaw

# -- Name of the pre-existing k8s Secret containing:
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY,
#   DATABASE_URL, KEY_ENCRYPTION_KEY
# Create this secret BEFORE deploying the chart.
# No secrets are stored in Helm values — they live in k8s Secrets only.
secretName: "logclaw-console-secrets"

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 3000
  annotations: {}

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

# TCP probes — Clerk middleware returns 404 for unauthenticated HTTP requests on /
livenessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

# -- HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# -- PDB
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Cloud SQL Auth Proxy sidecar
cloudsql:
  enabled: false
  instanceName: ""
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3"
  port: 5432
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# -- ExternalSecret (optional — for GCP Secret Manager / AWS Secrets Manager)
# When enabled, ESO creates the k8s Secret named by `secretName` automatically.
# When disabled (default), create the k8s Secret manually before deploying.
externalSecret:
  enabled: false
  refreshInterval: "1h"
  secretStoreName: "gcp-secret-store"
  secretStoreKind: "ClusterSecretStore"
  secrets:
    DATABASE_URL: "logclaw-console-db-url"
    CLERK_SECRET_KEY: "logclaw-clerk-secret"
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "logclaw-clerk-publishable"
    KEY_ENCRYPTION_KEY: "logclaw-key-encryption-key"

# -- OTEL Logging (console's own service logs → OTel Collector)
# Override exporterEndpoint when console is deployed as a separate Helm release.
otel:
  exporterEndpoint: ""

# -- Non-secret console config
config:
  clerkSignInUrl: "/sign-in"
  clerkSignUpUrl: "/sign-up"

# -- Backend service endpoints (explicit overrides)
# When set, these take precedence over the auto-generated Release.Name-based URLs.
# Use these when the console and backend stack have different Helm release names.
endpoints:
  opensearch: ""
  otelCollector: ""
  ticketing: ""
  bridge: ""
  feast: ""
  airflow: ""
  agent: ""
  # OpenSearch credentials
  opensearchUser: "admin"
  opensearchPasswordSecret: ""
  opensearchPasswordKey: "password"

# -- Skip TLS verification for internal services with self-signed certs (e.g. OpenSearch)
# Set to "0" to disable TLS verification
nodeTlsRejectUnauthorized: ""
