{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "logclaw-console.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-console.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "logclaw-console.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range $key, $remoteRef := .Values.externalSecret.secrets }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $remoteRef }}
    {{- end }}
{{- end }}
