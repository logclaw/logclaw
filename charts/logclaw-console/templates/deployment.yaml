apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logclaw-console.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-console.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "logclaw-console.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "logclaw-console.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "logclaw-console.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: console
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # --- Secrets (always from k8s Secret) ---
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: CLERK_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DATABASE_URL
            - name: KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: KEY_ENCRYPTION_KEY
                  optional: true
            # --- Non-secret config ---
            - name: NEXT_PUBLIC_CLERK_SIGN_IN_URL
              value: {{ .Values.config.clerkSignInUrl | quote }}
            - name: NEXT_PUBLIC_CLERK_SIGN_UP_URL
              value: {{ .Values.config.clerkSignUpUrl | quote }}
            # --- Backend service endpoints ---
            - name: OPENSEARCH_ENDPOINT
              value: {{ if .Values.endpoints.opensearch }}{{ .Values.endpoints.opensearch | quote }}{{ else }}{{ include "logclaw-console.opensearchEndpoint" . | quote }}{{ end }}
            - name: OPENSEARCH_USER
              value: {{ .Values.endpoints.opensearchUser | default "admin" | quote }}
            {{- if .Values.endpoints.opensearchPasswordSecret }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.endpoints.opensearchPasswordSecret }}
                  key: {{ .Values.endpoints.opensearchPasswordKey | default "password" }}
                  optional: true
            {{- end }}
            - name: OTEL_COLLECTOR_ENDPOINT
              value: {{ .Values.endpoints.otelCollector | default (include "logclaw-console.otelCollectorEndpoint" .) | quote }}
            # ── OTEL Logging (console's own service logs → OTel Collector) ──
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | default (printf "http://%s-logclaw-otel-collector.%s.svc:4318" .Release.Name .Release.Namespace) | quote }}
            - name: OTEL_SERVICE_NAME
              value: "logclaw-console"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "tenant_id={{ include "logclaw-console.logclawTenantId" . }}"
            - name: LOGCLAW_TENANT_ID
              value: {{ include "logclaw-console.logclawTenantId" . | quote }}
            - name: TICKETING_ENDPOINT
              value: {{ .Values.endpoints.ticketing | default (include "logclaw-console.ticketingEndpoint" .) | quote }}
            - name: BRIDGE_ENDPOINT
              value: {{ .Values.endpoints.bridge | default (include "logclaw-console.bridgeEndpoint" .) | quote }}
            - name: FEAST_ENDPOINT
              value: {{ .Values.endpoints.feast | default (printf "http://%s-logclaw-ml-engine-feast-server.%s.svc:6567" .Release.Name .Release.Namespace) | quote }}
            - name: AIRFLOW_ENDPOINT
              value: {{ .Values.endpoints.airflow | default (printf "http://%s-webserver.%s.svc:8080" .Release.Name .Release.Namespace) | quote }}
            - name: AGENT_ENDPOINT
              value: {{ .Values.endpoints.agent | default (printf "http://%s-logclaw-agent.%s.svc:8080" .Release.Name .Release.Namespace) | quote }}
            {{- if hasKey .Values "nodeTlsRejectUnauthorized" }}
            {{- if ne (toString .Values.nodeTlsRejectUnauthorized) "" }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: {{ .Values.nodeTlsRejectUnauthorized | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: nextjs-cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.cloudsql.enabled }}
        # Cloud SQL Auth Proxy sidecar
        - name: cloud-sql-proxy
          image: {{ .Values.cloudsql.image | quote }}
          args:
            - {{ .Values.cloudsql.instanceName | quote }}
            - "--port={{ .Values.cloudsql.port }}"
            - "--auto-iam-authn"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: sql
              containerPort: {{ .Values.cloudsql.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.cloudsql.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: nextjs-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
