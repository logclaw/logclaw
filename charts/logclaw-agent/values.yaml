replicaCount: 1

image:
  repository: ghcr.io/logclaw/agent
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []

# REQUIRED values
global:
  tenantId: ""        # e.g. "acme-corp"
  namespace: ""       # namespace where LogClaw stack is deployed; defaults to Release.Namespace

service:
  port: 8080

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
