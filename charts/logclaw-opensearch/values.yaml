nameOverride: ""
fullnameOverride: ""

opensearch:
  version: "2.14.0"
  indexReplicas: 0    # set to 1+ when running multiple data nodes

  # Dev mode: use standalone StatefulSet instead of Opster CRD
  # Avoids bootstrap pod race condition with single-master deployments
  devMode:
    enabled: false

  masters:
    replicas: 3
    diskSize: "50Gi"
    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
    jvm:
      xms: "4g"   # MUST equal xmx — OpenSearch crashes otherwise
      xmx: "4g"

  data:
    replicas: 3
    diskSize: "500Gi"
    resources:
      requests:
        cpu: "2"
        memory: "8Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
    jvm:
      xms: "8g"   # MUST equal xmx — OpenSearch crashes otherwise
      xmx: "8g"

  coordinators:
    replicas: 2
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "1"
        memory: "4Gi"

  security:
    adminPassword: ""  # Set via ExternalSecret (never in values)
    tls:
      enabled: true

  # Index Lifecycle Management (ISM) policy
  ism:
    hotRetentionDays: 9        # Delete log indices older than this (logclaw-logs-*); override via helm upgrade --set
    anomalyRetentionDays: 97   # Delete anomaly indices older than this (logclaw-anomalies-*); override via helm upgrade --set
    rolloverSize: "50gb"       # Rollover when index exceeds this size
    rolloverAge: "1d"          # Or when older than 1 day

podDisruptionBudget:
  dataNodes:
    minAvailable: 2
  masterNodes:
    minAvailable: 2

adminCredentialsSecret:
  name: "opensearch-admin-credentials"
  createExternalSecret: true
  secretStoreName: ""  # Uses global.secretStore.name if empty
