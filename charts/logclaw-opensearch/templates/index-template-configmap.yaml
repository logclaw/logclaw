apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "logclaw-opensearch.fullname" . }}-index-templates
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-opensearch.labels" . | nindent 4 }}
  annotations:
    logclaw.io/tenant: {{ include "logclaw-opensearch.tenantId" . }}
    logclaw.io/component: "hot-tier-storage"
data:
  ism-policy-anomalies.json: |
    {
      "policy": {
        "policy_id": "logclaw-anomaly-lifecycle",
        "description": "Lifecycle policy for anomaly indices — delete after retention period",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [],
            "transitions": [
              {
                "state_name": "delete",
                "conditions": {
                  "min_index_age": {{ printf "%dd" (int .Values.opensearch.ism.anomalyRetentionDays) | quote }}
                }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [{"delete": {}}],
            "transitions": []
          }
        ],
        "ism_template": [
          {
            "index_patterns": ["logclaw-anomalies-*"],
            "priority": 100
          }
        ]
      }
    }

  ism-policy.json: |
    {
      "policy": {
        "policy_id": "logclaw-hot-delete",
        "description": "Delete logs older than retention period",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [
              {
                "rollover": {
                  "min_size": {{ .Values.opensearch.ism.rolloverSize | quote }},
                  "min_index_age": {{ .Values.opensearch.ism.rolloverAge | quote }}
                }
              }
            ],
            "transitions": [
              {
                "state_name": "delete",
                "conditions": {
                  "min_index_age": {{ printf "%dd" (int .Values.opensearch.ism.hotRetentionDays) | quote }}
                }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [{"delete": {}}],
            "transitions": []
          }
        ],
        "ism_template": [
          {
            "index_patterns": ["logclaw-logs-*"],
            "priority": 100
          }
        ]
      }
    }

  index-template.json: |
    {
      "index_patterns": ["logclaw-logs-*"],
      "template": {
        "settings": {
          "number_of_shards": 3,
          "number_of_replicas": {{ .Values.opensearch.indexReplicas | default 0 }},
          "index.lifecycle.name": "logclaw-hot-delete",
          "index.lifecycle.rollover_alias": "logclaw-logs",
          "index.codec": "best_compression",
          "index.refresh_interval": "10s"
        },
        "mappings": {
          "dynamic": false,
          "properties": {
            "@timestamp": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            },
            "level": {
              "type": "keyword",
              "ignore_above": 32
            },
            "service": {
              "type": "keyword",
              "ignore_above": 256
            },
            "tenant_id": {
              "type": "keyword",
              "ignore_above": 128
            },
            "message": {
              "type": "text",
              "analyzer": "standard",
              "fields": {
                "keyword": {
                  "type": "keyword",
                  "ignore_above": 2048
                }
              }
            },
            "trace_id": {
              "type": "keyword",
              "ignore_above": 64
            },
            "span_id": {
              "type": "keyword",
              "ignore_above": 64
            },
            "anomaly_score": {
              "type": "float"
            },
            "log_id": {
              "type": "keyword",
              "ignore_above": 64
            },
            "environment": {
              "type": "keyword",
              "ignore_above": 64
            },
            "host_name": {
              "type": "keyword",
              "ignore_above": 256
            },
            "observed_timestamp": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            },
            "ingest_timestamp": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            },
            "enriched_at": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            },
            "scope_name": {
              "type": "keyword",
              "ignore_above": 256
            },
            "ml_features": {
              "type": "object",
              "enabled": false
            }
          }
        }
      },
      "priority": 100,
      "version": 2,
      "_meta": {
        "managed_by": "logclaw",
        "schema": "schemas/enriched-log.v1.schema.json",
        "chart": {{ include "logclaw-opensearch.chart" . | quote }}
      }
    }

  anomaly-template.json: |
    {
      "index_patterns": ["logclaw-anomalies-*"],
      "template": {
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": {{ .Values.opensearch.indexReplicas | default 0 }},
          "index.lifecycle.name": "logclaw-anomaly-lifecycle",
          "index.lifecycle.rollover_alias": "logclaw-anomalies",
          "index.codec": "best_compression",
          "index.refresh_interval": "5s"
        },
        "mappings": {
          "dynamic": false,
          "properties": {
            "@timestamp": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            },
            "event_id": {
              "type": "keyword",
              "ignore_above": 64
            },
            "anomaly_type": {
              "type": "keyword",
              "ignore_above": 128
            },
            "anomaly_score": {
              "type": "float"
            },
            "severity": {
              "type": "keyword",
              "ignore_above": 16
            },
            "service": {
              "type": "keyword",
              "ignore_above": 256
            },
            "tenant_id": {
              "type": "keyword",
              "ignore_above": 128
            },
            "environment": {
              "type": "keyword",
              "ignore_above": 64
            },
            "message": {
              "type": "text",
              "analyzer": "standard",
              "fields": {
                "keyword": {
                  "type": "keyword",
                  "ignore_above": 2048
                }
              }
            },
            "description": {
              "type": "text",
              "analyzer": "standard"
            },
            "trace_id": {
              "type": "keyword",
              "ignore_above": 64
            },
            "status": {
              "type": "keyword",
              "ignore_above": 32
            },
            "z_score": {
              "type": "float"
            },
            "error_rate": {
              "type": "float"
            },
            "affected_services": {
              "type": "keyword",
              "ignore_above": 256
            },
            "affected_endpoint": {
              "type": "keyword",
              "ignore_above": 512
            },
            "detected_at": {
              "type": "date",
              "format": "strict_date_optional_time||epoch_millis"
            }
          }
        }
      },
      "priority": 100,
      "version": 1,
      "_meta": {
        "managed_by": "logclaw",
        "schema": "schemas/anomaly-event.v1.schema.json",
        "chart": {{ include "logclaw-opensearch.chart" . | quote }}
      }
    }
