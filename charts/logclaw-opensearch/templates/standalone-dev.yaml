{{/*
  Standalone single-node OpenSearch for dev/CI.

  The Opster operator has a bootstrap-pod race condition with single-master
  (replicas: 1): it creates a bootstrap pod, forms a 2-node voting config,
  deletes bootstrap → master stuck without quorum.

  This template deploys a plain StatefulSet with discovery.type=single-node
  and the security plugin disabled, bypassing the Opster CRD entirely.

  Activated when:  opensearch.devMode.enabled = true  (set in CI values)
*/}}
{{- if .Values.opensearch.devMode.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "logclaw-opensearch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-opensearch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
  selector:
    app.kubernetes.io/name: {{ include "logclaw-opensearch.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch-standalone
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "logclaw-opensearch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-opensearch.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "logclaw-opensearch.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "logclaw-opensearch.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: opensearch-standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "logclaw-opensearch.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: opensearch-standalone
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: "opensearchproject/opensearch:{{ .Values.opensearch.version }}"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: discovery.type
              value: "single-node"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms{{ .Values.opensearch.masters.jvm.xms }} -Xmx{{ .Values.opensearch.masters.jvm.xmx }}"
            - name: cluster.name
              value: {{ include "logclaw-opensearch.fullname" . }}
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: {{ .Values.opensearch.masters.resources.requests.cpu | quote }}
              memory: {{ .Values.opensearch.masters.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.opensearch.masters.resources.limits.cpu | quote }}
              memory: {{ .Values.opensearch.masters.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with (include "logclaw-opensearch.storageClass" .) }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.opensearch.data.diskSize | quote }}
{{- end }}
