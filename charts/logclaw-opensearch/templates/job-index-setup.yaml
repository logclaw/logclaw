apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "logclaw-opensearch.fullname" . }}-index-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-opensearch.labels" . | nindent 4 }}
  annotations:
    logclaw.io/tenant: {{ include "logclaw-opensearch.tenantId" . }}
    logclaw.io/component: "hot-tier-storage"
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 1200   # 20 min — OpenSearch needs time to bootstrap first
  template:
    metadata:
      labels:
        {{- include "logclaw-opensearch.selectorLabels" . | nindent 8 }}
        logclaw.io/component: "index-setup-job"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opensearch-setup
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- if .Values.opensearch.devMode.enabled }}
              OPENSEARCH_URL="http://{{ include "logclaw-opensearch.fullname" . }}.{{ .Release.Namespace }}.svc.{{ include "logclaw-opensearch.clusterDomain" . }}:9200"
              AUTH_OPTS=""
              {{- else }}
              OPENSEARCH_URL="https://{{ include "logclaw-opensearch.fullname" . }}.{{ .Release.Namespace }}.svc.{{ include "logclaw-opensearch.clusterDomain" . }}:9200"
              AUTH_OPTS="-u admin:${OPENSEARCH_PASSWORD}"
              {{- end }}

              echo "Waiting for OpenSearch at ${OPENSEARCH_URL} ..."
              until curl -sk ${AUTH_OPTS} \
                "${OPENSEARCH_URL}/_cluster/health" \
                | grep -qE '"status":"(green|yellow)"'; do
                echo "  OpenSearch not ready yet — retrying in 10s"
                sleep 10
              done
              echo "OpenSearch is ready."

              echo "Applying ISM policy ..."
              curl -sk -X PUT \
                "${OPENSEARCH_URL}/_plugins/_ism/policies/logclaw-hot-delete" \
                -H "Content-Type: application/json" \
                ${AUTH_OPTS} \
                -d "$(cat /config/ism-policy.json)"
              echo ""

              echo "Applying index template ..."
              curl -sk -X PUT \
                "${OPENSEARCH_URL}/_index_template/logclaw-logs" \
                -H "Content-Type: application/json" \
                ${AUTH_OPTS} \
                -d "$(cat /config/index-template.json)"
              echo ""

              echo "Applying anomaly ISM policy ..."
              curl -sk -X PUT \
                "${OPENSEARCH_URL}/_plugins/_ism/policies/logclaw-anomaly-lifecycle" \
                -H "Content-Type: application/json" \
                ${AUTH_OPTS} \
                -d "$(cat /config/ism-policy-anomalies.json)"
              echo ""

              echo "Applying anomaly index template ..."
              curl -sk -X PUT \
                "${OPENSEARCH_URL}/_index_template/logclaw-anomalies" \
                -H "Content-Type: application/json" \
                ${AUTH_OPTS} \
                -d "$(cat /config/anomaly-template.json)"
              echo ""

              echo "Setup complete."
          {{- if not .Values.opensearch.devMode.enabled }}
          env:
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "logclaw-opensearch.adminSecretName" . }}
                  key: password
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: {{ include "logclaw-opensearch.fullname" . }}-index-templates
