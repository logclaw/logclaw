# LogClaw — Run the full stack locally with one command
# No cloning, no building, no Kubernetes required.
#
# Usage:
#   logclaw start            (recommended)
#   docker compose up -d     (manual)
#   open http://localhost:3000
#
# Requirements: Docker with 8 GB+ RAM allocated

services:
  # ── Data Layer ────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    labels:
      logclaw.service: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=LogClaw@2024
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.0
    labels:
      logclaw.service: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - CLUSTER_ID=logclaw-local-dev-001
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ── OTel Collector (OTLP ingestion) ──────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    labels:
      logclaw.service: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "13133:13133" # health
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      kafka:
        condition: service_healthy

  # ── LogClaw Services ─────────────────────────────────────
  bridge:
    image: ghcr.io/logclaw/logclaw-bridge:opus
    labels:
      logclaw.service: bridge
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_RAW=raw-logs
      - KAFKA_TOPIC_ENRICHED=enriched-logs
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - ANOMALY_THRESHOLD=2.5
      - WINDOW_SIZE=50
      - OTEL_SERVICE_NAME=logclaw-bridge
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=${LOGCLAW_TENANT_ID:-logclaw}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ticketing-agent:
    image: ghcr.io/logclaw/logclaw-ticketing-agent:opus
    labels:
      logclaw.service: ticketing-agent
    environment:
      - KAFKA_BROKERS=kafka:9092
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - LLM_PROVIDER=disabled
      - OTEL_SERVICE_NAME=logclaw-ticketing-agent
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=${LOGCLAW_TENANT_ID:-logclaw}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "18081:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_healthy

  dashboard:
    image: ghcr.io/logclaw/logclaw-dashboard:opus
    labels:
      logclaw.service: dashboard
    environment:
      - LOGCLAW_MODE=standalone
      - NEXT_PUBLIC_LOGCLAW_MODE=standalone
      - OTEL_SERVICE_NAME=logclaw-dashboard
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=${LOGCLAW_TENANT_ID:-logclaw}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - BRIDGE_ENDPOINT=http://bridge:8080
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=LogClaw@2024
      - TICKETING_ENDPOINT=http://ticketing-agent:8080
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      bridge:
        condition: service_started
      ticketing-agent:
        condition: service_started

volumes:
  opensearch-data:
  kafka-data:
