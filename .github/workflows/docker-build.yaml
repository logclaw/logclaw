name: Build & Push Container Images

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/docker-build.yaml"
  pull_request:
    paths:
      - "apps/**"
  # Manual trigger — build specific image or all
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build (dashboard, bridge, ticketing-agent, agent, auth-proxy, flink-jobs, or all)"
        required: false
        default: "all"

# Cancel in-flight runs for the same branch
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Detect which apps changed ──────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      bridge: ${{ steps.filter.outputs.bridge }}
      ticketing-agent: ${{ steps.filter.outputs.ticketing-agent }}
      agent: ${{ steps.filter.outputs.agent }}
      auth-proxy: ${{ steps.filter.outputs.auth-proxy }}
      flink-jobs: ${{ steps.filter.outputs.flink-jobs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/dashboard/**'
            bridge:
              - 'apps/bridge/**'
            ticketing-agent:
              - 'apps/ticketing-agent/**'
            agent:
              - 'apps/agent/**'
            auth-proxy:
              - 'apps/logclaw-auth-proxy/**'
            flink-jobs:
              - 'apps/flink-jobs/**'

  # ── Build matrix ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dashboard
            context: apps/dashboard
          - image: bridge
            context: apps/bridge
          - image: ticketing-agent
            context: apps/ticketing-agent
          - image: agent
            context: apps/agent
          - image: auth-proxy
            context: apps/logclaw-auth-proxy
          - image: flink-jobs
            context: apps/flink-jobs

    steps:
      # matrix context is only available at step level, not job-level if
      - name: Check if build is needed
        id: gate
        shell: bash
        run: |
          SHOULD_BUILD=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_BUILD=true
          fi
          case "${{ matrix.image }}" in
            dashboard)       [[ "${{ needs.changes.outputs.dashboard }}" == "true" ]]        && SHOULD_BUILD=true ;;
            bridge)          [[ "${{ needs.changes.outputs.bridge }}" == "true" ]]           && SHOULD_BUILD=true ;;
            ticketing-agent) [[ "${{ needs.changes.outputs.ticketing-agent }}" == "true" ]]  && SHOULD_BUILD=true ;;
            agent)           [[ "${{ needs.changes.outputs.agent }}" == "true" ]]            && SHOULD_BUILD=true ;;
            auth-proxy)      [[ "${{ needs.changes.outputs.auth-proxy }}" == "true" ]]       && SHOULD_BUILD=true ;;
            flink-jobs)      [[ "${{ needs.changes.outputs.flink-jobs }}" == "true" ]]       && SHOULD_BUILD=true ;;
          esac
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "🔍 ${{ matrix.image }}: should_build=$SHOULD_BUILD"

      - uses: actions/checkout@v5
        if: steps.gate.outputs.should_build == 'true'

      # ── Read version from source (package.json or VERSION file) ──
      - name: Read app version
        if: steps.gate.outputs.should_build == 'true'
        id: version
        run: |
          CTX="${{ matrix.context }}"
          if [ -f "$CTX/package.json" ]; then
            VERSION=$(python3 -c "import sys,json; print(json.load(open('$CTX/package.json'))['version'])")
          elif [ -f "$CTX/VERSION" ]; then
            VERSION=$(cat "$CTX/VERSION" | tr -d '[:space:]')
          elif [ -f "$CTX/pom.xml" ]; then
            VERSION=$(python3 -c "import xml.etree.ElementTree as ET; ns={'m':'http://maven.apache.org/POM/4.0.0'}; print(ET.parse('$CTX/pom.xml').getroot().find('m:version',ns).text)")
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 ${{ matrix.image }} version: $VERSION"

      # ── Docker Buildx (multi-arch) ──
      - name: Set up QEMU
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # ── Login to GHCR ──
      - name: Login to GHCR
        if: steps.gate.outputs.should_build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata (tags + labels) ──
      - name: Docker metadata
        if: steps.gate.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_PATH }}/logclaw-${{ matrix.image }}
          tags: |
            # Semantic version read from package.json or VERSION file
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            # Git SHA (always, for traceability)
            type=sha,prefix=sha-,format=short
            # Release codename (only on main)
            type=raw,value=opus,enable={{is_default_branch}}
            # PR number (for PR builds)
            type=ref,event=pr

      # ── Build + Push ──
      - name: Build and push
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      # ── Trivy vulnerability scan (report only, never blocks push) ──
      - name: Scan for vulnerabilities
        if: steps.gate.outputs.should_build == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY_PATH }}/logclaw-${{ matrix.image }}:sha-${{ github.sha }}
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      # ── Summary ──
      - name: Image summary
        if: steps.gate.outputs.should_build == 'true' && github.event_name != 'pull_request'
        run: |
          echo "### 🐳 ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.REGISTRY_PATH }}/logclaw-${{ matrix.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`${{ steps.version.outputs.version }}\`, \`sha-${GITHUB_SHA::7}\`, \`opus\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | \`linux/amd64\` |" >> $GITHUB_STEP_SUMMARY
