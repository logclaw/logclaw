# ═══════════════════════════════════════════════════════════════════
# LogClaw Local — OrbStack Kubernetes
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   helm upgrade --install logclaw ./charts/logclaw-tenant -n logclaw \
#     -f deployments/local-orbstack-values.yaml --no-hooks
# ═══════════════════════════════════════════════════════════════════

airflow:
  enabled: false          # not needed for pipeline testing
bridge:
  enabled: true
dashboard:
  enabled: true
flink:
  enabled: false          # Bridge handles ETL/Anomaly locally
kafka:
  enabled: true
opensearch:
  enabled: true
otelCollector:
  enabled: true
ticketingAgent:
  enabled: true
mlEngine:
  enabled: false          # Feast not needed locally

global:
  tenantId: local
  tenantName: "LogClaw Local"
  tier: standard
  resourcePreset: small
  storageClass: standard
  storageClassHighThroughput: standard

  imagePullSecrets:
    - name: ghcr-logclaw
  imageRegistry: ""

  kafkaBrokers: "logclaw-kafka-bootstrap.logclaw.svc.cluster.local:9092"
  kafkaTopics:
    rawLogs: "raw-logs"
    enriched: "enriched-logs"
    anomalies: "anomaly-events"

  opensearchEndpoint: "http://logclaw-logclaw-opensearch.logclaw.svc.cluster.local:9200"

  objectStorage:
    provider: gcs
    bucket: logclaw-local-dev
    region: us-central1

  ingressClass: ""
  tls:
    enabled: false

  podSecurityStandards:
    enforce: privileged
    audit: restricted
    warn: restricted

  monitoring:
    enabled: false

  llm:
    provider: disabled

# No ingress for local
ingress:
  enabled: false

# ─── Subchart overrides (minimal for local) ─────────────────────

logclaw-kafka:
  kafka:
    replicas: 1
    version: "4.0.0"
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: "1"
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      min.insync.replicas: "1"
      log.retention.hours: "24"
    jvmOptions:
      -Xms: "512m"
      -Xmx: "1g"
    resources:
      requests: { cpu: "200m", memory: "768Mi" }
      limits:   { cpu: "1",    memory: "2Gi" }
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: "10Gi"
          class: standard
          deleteClaim: true
  kafkaConnect:
    enabled: false
  topics:
    rawLogs:
      partitions: 3
      replicas: 1
      retentionMs: "86400000"
    enriched:
      partitions: 3
      replicas: 1
      retentionMs: "86400000"
    anomalies:
      partitions: 1
      replicas: 1
      retentionMs: "86400000"
    dlq:
      partitions: 1
      replicas: 1
      retentionMs: "86400000"

logclaw-opensearch:
  opensearch:
    version: "2.14.0"
    devMode:
      enabled: true
    security:
      tls:
        enabled: false
    masters:
      replicas: 1
      diskSize: "5Gi"
      resources:
        requests: { cpu: "250m", memory: "1Gi" }
        limits:   { cpu: "1",    memory: "2Gi" }
      jvm:
        xms: "1g"
        xmx: "1g"
    data:
      replicas: 1
      diskSize: "10Gi"
      resources:
        requests: { cpu: "250m", memory: "1Gi" }
        limits:   { cpu: "1",    memory: "2Gi" }
      jvm:
        xms: "1g"
        xmx: "1g"
    coordinators:
      replicas: 0
  podDisruptionBudget:
    dataNodes:  { minAvailable: 0 }
    masterNodes: { minAvailable: 0 }

logclaw-otel-collector:
  image:
    tag: "0.114.0"
  replicaCount: 1
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

logclaw-bridge:
  image:
    repository: ghcr.io/logclaw/logclaw-bridge
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  bridge:
    resources:
      requests: { cpu: "100m", memory: "128Mi" }
      limits:   { cpu: "500m", memory: "256Mi" }

logclaw-dashboard:
  image:
    repository: ghcr.io/logclaw/logclaw-dashboard
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 3000

logclaw-ticketing-agent:
  image:
    repository: ghcr.io/logclaw/logclaw-ticketing-agent
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  config:
    email:
      enabled: false
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }
  autoscaling:
    enabled: false
