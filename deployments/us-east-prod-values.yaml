# ═══════════════════════════════════════════════════════════════════
# LogClaw Production — US East (us-east1-b)
# ═══════════════════════════════════════════════════════════════════
# Cluster:  gke_project-9490bf61-5a92-4130-9de_us-east1-b_logclaw-us-east
# Account:  househosanna2@gmail.com
# Issuer:   logclaw-issuer (Let's Encrypt HTTP-01)
#
# Usage:
#   helm upgrade logclaw ./charts/logclaw-tenant -n logclaw -f deployments/us-east-prod-values.yaml --no-hooks
#   helm upgrade logclaw-auth-proxy ./charts/logclaw-auth-proxy -n logclaw --set global.clusterDomain=cluster.local --set replicaCount=1
#   helm upgrade logclaw-console ./charts/logclaw-console -n logclaw -f deployments/us-east-console-values.yaml
# ═══════════════════════════════════════════════════════════════════

airflow:
  enabled: true
bridge:
  enabled: true
dashboard:
  enabled: true
flink:
  enabled: false              # disabled — requires flink-pool node + Workload Identity
kafka:
  enabled: true
opensearch:
  enabled: true
otelCollector:
  enabled: true
ticketingAgent:
  enabled: true
mlEngine:
  enabled: true

global:
  tenantId: prod
  tenantName: "LogClaw US-East"
  tier: standard
  resourcePreset: small
  storageClass: standard
  storageClassHighThroughput: standard

  imagePullSecrets:
    - name: ghcr-logclaw
  imageRegistry: ""   # CRITICAL: must be "" — prevents prepending ghcr.io/logclaw to third-party images

  kafkaBrokers: "logclaw-kafka-bootstrap.logclaw.svc.cluster.local:9092"
  kafkaTopics:
    rawLogs: "raw-logs"
    enriched: "enriched-logs"
    anomalies: "anomaly-events"

  opensearchEndpoint: "http://logclaw-logclaw-opensearch.logclaw.svc.cluster.local:9200"

  objectStorage:
    provider: gcs
    bucket: logclaw-us-east-data
    region: us-east1

  ingressClass: nginx
  tls:
    enabled: true
    issuerName: logclaw-issuer
    issuerKind: ClusterIssuer
    clusterIssuer: logclaw-issuer

  podSecurityStandards:
    enforce: privileged     # required for OpenSearch init-sysctl
    audit: restricted
    warn: restricted

  monitoring:
    enabled: false

  llm:
    provider: disabled

# ─── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: true
  authProxyServiceName: "logclaw-auth-proxy"
  otel:
    host: otel.us-east.logclaw.ai
  api:
    host: api.us-east.logclaw.ai
  ticketing:
    host: ticket.us-east.logclaw.ai
  console:
    host: console-us-east.logclaw.ai
    serviceName: logclaw-console
    servicePort: 3000
  dashboard:
    host: app.us-east.logclaw.ai
  airflow:
    host: airflow.us-east.logclaw.ai

# ─── Subchart overrides (mirrored from us-west) ──────────────────

logclaw-kafka:
  kafka:
    replicas: 1
    version: "4.0.0"
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: "1"
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      min.insync.replicas: "1"
      log.retention.hours: "48"
      log.segment.bytes: "1073741824"
      num.io.threads: "8"
      num.network.threads: "3"
    jvmOptions:
      -Xms: "1g"
      -Xmx: "2g"
    resources:
      requests:
        cpu: "500m"
        memory: "1536Mi"
      limits:
        cpu: "2"
        memory: "4Gi"
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: "50Gi"
          class: standard
          deleteClaim: false
  kafkaConnect:
    enabled: false
  topics:
    rawLogs:
      partitions: 6
      replicas: 1
      retentionMs: "172800000"
      segmentBytes: "1073741824"
    enriched:
      partitions: 6
      replicas: 1
      retentionMs: "172800000"
    anomalies:
      partitions: 3
      replicas: 1
      retentionMs: "604800000"
    dlq:
      partitions: 1
      replicas: 1
      retentionMs: "2592000000"

logclaw-opensearch:
  opensearch:
    version: "2.14.0"
    devMode:
      enabled: true
    security:
      tls:
        enabled: false
    masters:
      replicas: 1
      diskSize: "20Gi"
      resources:
        requests: { cpu: "500m", memory: "2Gi" }
        limits:   { cpu: "2",    memory: "4Gi" }
      jvm:
        xms: "2g"
        xmx: "2g"
    data:
      replicas: 1
      diskSize: "50Gi"
      resources:
        requests: { cpu: "500m", memory: "2Gi" }
        limits:   { cpu: "2",    memory: "4Gi" }
      jvm:
        xms: "2g"
        xmx: "2g"
    coordinators:
      replicas: 0
  podDisruptionBudget:
    dataNodes:  { minAvailable: 0 }
    masterNodes: { minAvailable: 0 }

logclaw-otel-collector:
  image:
    tag: "0.114.0"
  replicaCount: 2
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

logclaw-bridge:
  image:
    repository: ghcr.io/logclaw/logclaw-bridge
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  bridge:
    resources:
      requests: { cpu: "200m", memory: "256Mi" }
      limits:   { cpu: "1",    memory: "512Mi" }

logclaw-dashboard:
  image:
    repository: ghcr.io/logclaw/logclaw-dashboard
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  service:
    type: ClusterIP
    port: 3000

logclaw-ticketing-agent:
  image:
    repository: ghcr.io/logclaw/logclaw-ticketing-agent
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  config:
    email:
      enabled: true
      provider: resend
      fromAddress: "alert@logclaw.ai"
      smtpHost: ""
      smtpPort: 587
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

logclaw-airflow:
  airflow:
    executor: KubernetesExecutor
    images:
      airflow:
        repository: apache/airflow
        tag: "2.9.3"
    dags:
      gitSync:
        enabled: false
    data:
      metadataSecretName: logclaw-metadata
    postgresql:
      image:
        registry: docker.io
        tag: latest
      persistence:
        size: 5Gi
    redis:
      enabled: false
    statsd:
      enabled: false
    webserver:
      replicas: 1
      defaultUser:
        enabled: false
      resources:
        requests: { cpu: "500m", memory: "1Gi" }
        limits:   { cpu: "1",    memory: "2Gi" }
    scheduler:
      replicas: 1
      resources:
        requests: { cpu: "250m", memory: "512Mi" }
        limits:   { cpu: "1",    memory: "1536Mi" }
    workers:
      replicas: 0
    triggerer:
      replicas: 0
    flower:
      enabled: false
  podDisruptionBudget:
    scheduler: { minAvailable: 0 }
    webserver: { minAvailable: 0 }

logclaw-ml-engine:
  mlEngine:
    feast:
      image:
        repository: feastdev/feature-server
        tag: "0.40.0"
      replicaCount: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
    kserve: { enabled: false }
    ollama: { enabled: false }
  redis:
    image:
      registry: docker.io
      tag: latest
    master:
      persistence:
        size: 5Gi
    replica:
      replicaCount: 0
  podDisruptionBudget:
    minAvailable: 0
