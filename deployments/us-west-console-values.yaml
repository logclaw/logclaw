# ═══════════════════════════════════════════════════════════════════
# LogClaw Console — US West Production
# ═══════════════════════════════════════════════════════════════════
# Deployed as separate Helm release: logclaw-console
#
# Usage:
#   helm upgrade logclaw-console ./charts/logclaw-console -n logclaw -f deployments/us-west-console-values.yaml
# ═══════════════════════════════════════════════════════════════════

image:
  repository: ghcr.io/logclaw/logclaw-enterprise
  tag: "2.2.0"
  pullPolicy: IfNotPresent

replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# OpenSearch connection
endpoints:
  opensearch: "http://logclaw-logclaw-opensearch.logclaw.svc.cluster.local:9200"
  opensearchUser: "admin"
  opensearchPasswordSecret: "logclaw-logclaw-opensearch-admin-password"
  opensearchPasswordKey: "password"
  # All other endpoints auto-resolved via tenantReleaseName (default: "logclaw")

# Skip TLS verification for internal OpenSearch (self-signed)
nodeTlsRejectUnauthorized: "0"
