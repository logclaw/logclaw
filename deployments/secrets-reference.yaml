# ═══════════════════════════════════════════════════════════════════
# Required Kubernetes Secrets — Create BEFORE helm install
# ═══════════════════════════════════════════════════════════════════
# These secrets must exist in the logclaw namespace before deploying.
# This file documents the STRUCTURE only — never commit actual values.
#
# Last verified: 2026-03-14 on us-west production cluster
# ═══════════════════════════════════════════════════════════════════

# ─── 1. GHCR Image Pull Secret ────────────────────────────────────
# kubectl create secret docker-registry ghcr-logclaw \
#   --docker-server=ghcr.io \
#   --docker-username=<GITHUB_USER> \
#   --docker-password=<GITHUB_PAT> \
#   -n logclaw
#
# Required by: ALL LogClaw images (bridge, dashboard, auth-proxy, ticketing, flink, otel-collector)

# ─── 2. PostgreSQL Connection (for auth-proxy) ────────────────────
# kubectl create secret generic logclaw-postgres \
#   --from-literal=connection-string="postgresql://USER:PASS@HOST:5432/logclaw_enterprise" \
#   -n logclaw
#
# Key: connection-string
# Required by: logclaw-auth-proxy (validates API keys against this DB)

# ─── 3. Console Secrets (Clerk + DB + encryption) ─────────────────
# kubectl create secret generic logclaw-console-secrets \
#   --from-literal=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_live_..." \
#   --from-literal=CLERK_SECRET_KEY="sk_live_..." \
#   --from-literal=DATABASE_URL="postgresql://USER:PASS@HOST:5432/logclaw_enterprise" \
#   --from-literal=KEY_ENCRYPTION_KEY="<32-byte-hex>" \
#   -n logclaw
#
# Keys: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY, DATABASE_URL, KEY_ENCRYPTION_KEY
# Required by: logclaw-console

# ─── 4. Resend API Key (email delivery) ───────────────────────────
# kubectl create secret generic logclaw-resend-api-key \
#   --from-literal=api-key="re_..." \
#   -n logclaw
#
# Key: api-key
# Required by: logclaw-ticketing-agent (sends alert emails)

# ─── 5. OpenSearch Admin Password ─────────────────────────────────
# kubectl create secret generic logclaw-logclaw-opensearch-admin-password \
#   --from-literal=username="admin" \
#   --from-literal=password="admin" \
#   -n logclaw
#
# Keys: username, password
# Required by: logclaw-console (reads logs), index-setup hook
# NOTE: In devMode (us-west), password is "admin". In production TLS mode, use a strong password.

# ─── 6. Airflow Credentials ───────────────────────────────────────
# kubectl create secret generic logclaw-airflow-credentials \
#   --from-literal=fernet-key="$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" \
#   --from-literal=webserver-secret-key="$(python3 -c 'import secrets; print(secrets.token_hex(16))')" \
#   --from-literal=postgresql-password="<AIRFLOW_PG_PASS>" \
#   -n logclaw
#
# Keys: fernet-key, webserver-secret-key, postgresql-password
# Required by: logclaw-airflow (scheduler, webserver, PostgreSQL subchart)

# ─── 7. Airflow Metadata DB Connection ────────────────────────────
# kubectl create secret generic logclaw-metadata \
#   --from-literal=connection="postgresql://postgres:<AIRFLOW_PG_PASS>@logclaw-postgresql.logclaw.svc:5432/postgres" \
#   -n logclaw
#
# Key: connection
# Required by: logclaw-airflow (scheduler, webserver connect to PostgreSQL)
# NOTE: Uses the SAME password as logclaw-airflow-credentials.postgresql-password

# ─── 8. Ticketing Agent Credentials ───────────────────────────────
# kubectl create secret generic logclaw-logclaw-ticketing-agent-credentials \
#   --from-literal=DEFAULT_OPENAI_API_KEY="sk-..." \
#   --from-literal=JIRA_TOKEN="" \
#   --from-literal=PAGERDUTY_TOKEN="" \
#   --from-literal=SLACK_TOKEN="" \
#   -n logclaw
#
# Keys: DEFAULT_OPENAI_API_KEY, JIRA_TOKEN, PAGERDUTY_TOKEN, SLACK_TOKEN
# Required by: logclaw-ticketing-agent (AI-powered incident triage)
# NOTE: JIRA/PD/Slack tokens can be empty if those integrations aren't configured

# ═══════════════════════════════════════════════════════════════════
# ClusterIssuer (create AFTER cert-manager is installed)
# ═══════════════════════════════════════════════════════════════════
#
# kubectl apply -f - <<EOF
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: logclaw-issuer
# spec:
#   acme:
#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: support@logclaw.ai
#     privateKeySecretRef:
#       name: logclaw-issuer-account-key
#     solvers:
#     - http01:
#         ingress:
#           class: nginx
# EOF
#
# IMPORTANT: DNS records must be DNS-only (gray cloud in Cloudflare),
# NOT proxied. Cloudflare proxy blocks HTTP-01 ACME challenges for
# nested subdomains (*.us-east.logclaw.ai) and can interfere with
# cert issuance even for top-level subdomains.

