    <path d="M6 6 L22 30" stroke="#FF5722" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M12 4 L26 26" stroke="#FF5722" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M18 2 L30 22" stroke="#FF5722" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Log line under claw -->
    <path d="M4 34 L30 34" stroke="#FF8A65" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="40" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Log<tspan fill="#FF5722">Claw</tspan></text>
</svg>
