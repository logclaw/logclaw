# OTel Collector config for LogClaw docker-compose
# Receives OTLP logs and forwards to Kafka

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 256
    timeout: 5s

exporters:
  kafka:
    brokers:
      - kafka:9092
    topic: raw-logs
    encoding: otlp_json
    producer:
      max_message_bytes: 10000000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka]
